body:
  text: 姑蘇金人瑞聖歎著娑婆世界釋尊住持華藏世界盧舍那世尊住持釋尊新成佛盧舍那本成佛也他方世界有阿彌陀佛住于極樂國土一花一世尊非算數譬喻之所能及所以阿彌陀經為無問自説經首題佛説阿彌陀下加不得一佛字然燈佛者一微塵佛也釋迦佛者無量微塵佛也釋迦佛者名為病愈阿彌陀者名本無病世尊説阿彌陀經另一施設與諸經不同乃是為一切衆生畢竟不能破我故特地全舉法界説你本住在極樂國土中各各蓮花化生有甚不好譬如醜婦人一般貯之洞房深宮亦自覺標致也喜怒哀樂四字以樂為極所以知之學者好之聖人樂之即天地也蓮花取相連義曰蓮三世相連花有房房有蔤因非實相曰花一一衆生各坐一花花開見佛則見釋迦佛也極樂國土九品化生上品上生者乃是彌勒一生補處于此成佛下品下生者乃是阿鼻大地獄罪人于此成佛是人因犯極惡大罪下阿鼻獄有善知識以種種因緣唱阿彌陀佛如千年暗室一燈照之而此罪人聞此名字地獄即在蓮花中而此蓮花即在極樂國土中而此極樂國土為阿彌陀佛世界中此阿彌陀佛世界乃即在無量大地獄內一罪人之八識田中是人總犯極惡大罪不敵阿彌陀名字所以地獄應時粉碎此謂下品下生也菩薩不願住於惡濁世界則不得不求生極樂然而得生極樂乃是果事欲獲果者先須造因云何造因念佛三昧是也念佛之法不可以妄心念于遙佛亦不可以妄心念於妄心何以故妄心者是生死因不能感通于本際故以生死因不能感通故故佛本不遙而遂遙也復次妄心念于妄心者凡夫正為妄心連持至墮地獄今復教以如是念佛彼即以前妄心為念後妄心為佛或以前妄心為佛後妄心為念如是即與世間流浪何異是故此法所不應用夫念佛之法不應先見佛次作念正應先念成次見佛所以者何若先見佛佛是何事如是名為大妄語人又即使感應道交佛或示現然佛來尋念佛去久矣又況能念正是妄心妄心何可唐突於佛所謂先念成次見佛者念是實佛是假菩薩以本際為念而以妄心為佛問何故不以妄心為念本際為佛答本際者不可見不可見則不能令行人發歡喜心又本際纖塵不立若行人於念處用力即大不應又師子乳用玻璃盞盛他器不受若行人欲以妄心念本際譬如毒器盛師子乳終竟不受又念佛三昧對住生死若用妄心追逐終入生死海無疑也終
